<!DOCTYPE html>
<html>
<head>
    <title>Clear Cache - OSMRoad</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        h1 { color: #3b82f6; }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: background 0.2s;
        }
        .btn:hover { background: #2563eb; }
        .btn.danger { background: #ef4444; }
        .btn.danger:hover { background: #dc2626; }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: #1e1e2e;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 OSMRoad Cache Cleaner</h1>
        <p>Klik tombol di bawah untuk membersihkan cache dan melihat perubahan UI terbaru.</p>
        
        <button class="btn danger" onclick="clearAllCache()">
            🗑️ Clear All Cache & Reload
        </button>
        
        <button class="btn" onclick="location.href='/'">
            ↩️ Kembali ke App
        </button>
        
        <div id="status" class="status" style="display: none;"></div>
    </div>

    <script>
        async function clearAllCache() {
            const status = document.getElementById('status');
            status.style.display = 'block';
            status.innerHTML = 'Menghapus cache...';
            
            try {
                // Unregister service workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (const reg of registrations) {
                        await reg.unregister();
                        status.innerHTML += '<br>✓ Service Worker unregistered';
                    }
                }
                
                // Clear caches
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    for (const name of cacheNames) {
                        await caches.delete(name);
                        status.innerHTML += `<br>✓ Cache "${name}" deleted`;
                    }
                }
                
                // Clear localStorage
                localStorage.clear();
                status.innerHTML += '<br>✓ localStorage cleared';
                
                // Clear sessionStorage
                sessionStorage.clear();
                status.innerHTML += '<br>✓ sessionStorage cleared';
                
                // Clear IndexedDB
                const databases = await window.indexedDB.databases();
                for (const db of databases) {
                    if (db.name) {
                        await new Promise((resolve) => {
                            const req = window.indexedDB.deleteDatabase(db.name);
                            req.onsuccess = resolve;
                            req.onerror = resolve;
                        });
                        status.innerHTML += `<br>✓ IndexedDB "${db.name}" deleted`;
                    }
                }
                
                status.innerHTML += '<br><br><span class="success">✅ All cache cleared! Reloading...</span>';
                
                // Reload after 2 seconds
                setTimeout(() => {
                    location.href = '/?nocache=' + Date.now();
                }, 2000);
                
            } catch (err) {
                status.innerHTML += `<br><br><span class="error">❌ Error: ${err.message}</span>`;
            }
        }
    </script>
</body>
</html>
